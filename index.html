<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FX 相場日記</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Share+Tech+Mono&display=swap');

:root {
–bg: #0a0e14;
–surface: #111822;
–surface2: #1a2535;
–border: #1e3050;
–accent: #00d4aa;
–accent2: #ff6b35;
–bull: #00d4aa;
–bear: #ff4d6d;
–text: #c8d8e8;
–text-dim: #5a7a9a;
–text-bright: #eaf4ff;
–gold: #ffd166;
}

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘Noto Sans JP’, sans-serif;
min-height: 100vh;
display: flex;
flex-direction: column;
}

/* Header */
header {
background: var(–surface);
border-bottom: 1px solid var(–border);
padding: 16px 24px;
display: flex;
align-items: center;
gap: 16px;
position: sticky;
top: 0;
z-index: 100;
}

.logo {
font-family: ‘Share Tech Mono’, monospace;
font-size: 22px;
color: var(–accent);
letter-spacing: 2px;
}

.logo span { color: var(–gold); }

.nav-tabs {
display: flex;
gap: 4px;
margin-left: 28px;
}

.nav-tab {
background: none;
border: 1px solid var(–border);
color: var(–text-dim);
padding: 6px 18px;
border-radius: 6px;
cursor: pointer;
font-size: 13px;
font-family: ‘Noto Sans JP’, sans-serif;
transition: all 0.2s;
}

.nav-tab:hover { border-color: var(–accent); color: var(–text); }
.nav-tab.active { background: var(–accent); color: #000; border-color: var(–accent); font-weight: 700; }

/* Library Panel */
.library-panel {
display: none;
flex-direction: column;
height: calc(100vh - 57px);
overflow: hidden;
}

.library-panel.visible { display: flex; }

.lib-header {
background: var(–surface);
border-bottom: 1px solid var(–border);
padding: 16px 24px;
display: flex;
align-items: center;
gap: 12px;
}

.lib-title {
font-family: ‘Share Tech Mono’, monospace;
font-size: 18px;
color: var(–text-bright);
flex: 1;
}

.lib-subtitle {
font-size: 12px;
color: var(–text-dim);
margin-top: 2px;
}

.lib-body {
flex: 1;
overflow-y: auto;
padding: 24px;
display: flex;
flex-direction: column;
gap: 24px;
}

/* Category sections */
.lib-category {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 10px;
overflow: hidden;
}

.lib-cat-header {
display: flex;
align-items: center;
padding: 12px 16px;
gap: 10px;
border-bottom: 1px solid var(–border);
background: var(–surface2);
}

.lib-cat-icon { font-size: 18px; }

.lib-cat-name {
font-size: 14px;
font-weight: 700;
color: var(–text-bright);
flex: 1;
}

.lib-cat-count {
font-family: ‘Share Tech Mono’, monospace;
font-size: 11px;
color: var(–text-dim);
}

.lib-cat-add {
background: none;
border: 1px solid var(–border);
color: var(–text-dim);
padding: 4px 12px;
border-radius: 5px;
font-size: 12px;
cursor: pointer;
transition: all 0.15s;
}

.lib-cat-add:hover { border-color: var(–accent); color: var(–accent); }

.lib-cat-body { padding: 14px 16px; }

.lib-cat-notes {
font-size: 13px;
color: var(–text);
line-height: 1.7;
background: var(–bg);
border: 1px solid var(–border);
border-radius: 6px;
padding: 8px 12px;
width: 100%;
margin-bottom: 12px;
resize: none;
min-height: 50px;
font-family: ‘Noto Sans JP’, sans-serif;
transition: border-color 0.2s;
}

.lib-cat-notes:focus { outline: none; border-color: var(–accent); }

.lib-img-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
gap: 10px;
margin-bottom: 10px;
}

/* New category form */
.new-cat-form {
background: var(–surface);
border: 2px dashed var(–border);
border-radius: 10px;
padding: 20px;
display: flex;
gap: 10px;
align-items: center;
}

.new-cat-input {
flex: 1;
background: var(–surface2);
border: 1px solid var(–border);
color: var(–text-bright);
border-radius: 6px;
padding: 8px 12px;
font-size: 13px;
font-family: ‘Noto Sans JP’, sans-serif;
}

.new-cat-input:focus { outline: none; border-color: var(–accent); }

.icon-picker {
background: var(–surface2);
border: 1px solid var(–border);
color: var(–text);
border-radius: 6px;
padding: 8px;
font-size: 16px;
cursor: pointer;
width: 42px;
text-align: center;
}

.new-cat-btn {
background: var(–accent);
color: #000;
border: none;
padding: 8px 16px;
border-radius: 6px;
font-size: 13px;
font-weight: 700;
cursor: pointer;
font-family: ‘Noto Sans JP’, sans-serif;
}

.lib-save-indicator {
font-size: 11px;
color: var(–accent);
opacity: 0;
transition: opacity 0.3s;
font-family: ‘Share Tech Mono’, monospace;
}

.lib-save-indicator.show { opacity: 1; }

/* Layout */
.main {
display: grid;
grid-template-columns: 320px 1fr;
gap: 0;
flex: 1;
height: calc(100vh - 57px);
}

/* Calendar */
.calendar-panel {
background: var(–surface);
border-right: 1px solid var(–border);
padding: 20px;
overflow-y: auto;
display: flex;
flex-direction: column;
gap: 16px;
}

.cal-header {
display: flex;
align-items: center;
justify-content: space-between;
}

.cal-month {
font-family: ‘Share Tech Mono’, monospace;
font-size: 16px;
color: var(–text-bright);
}

.cal-nav {
background: none;
border: 1px solid var(–border);
color: var(–text-dim);
width: 28px;
height: 28px;
border-radius: 4px;
cursor: pointer;
font-size: 14px;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.2s;
}

.cal-nav:hover { border-color: var(–accent); color: var(–accent); }

.cal-grid {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 4px;
}

.cal-dow {
font-size: 10px;
color: var(–text-dim);
text-align: center;
padding: 4px 0;
font-family: ‘Share Tech Mono’, monospace;
}

.cal-day {
aspect-ratio: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
border-radius: 6px;
cursor: pointer;
font-size: 12px;
transition: all 0.15s;
position: relative;
border: 1px solid transparent;
gap: 1px;
padding: 2px 0;
}

.cal-day-num { font-size: 12px; line-height: 1; }

.cal-day-pl {
font-family: ‘Share Tech Mono’, monospace;
font-size: 8px;
line-height: 1;
letter-spacing: -0.3px;
}

.cal-day-pl.plus { color: var(–bull); }
.cal-day-pl.minus { color: var(–bear); }

.cal-day:hover { background: var(–surface2); border-color: var(–border); }
.cal-day.today { border-color: var(–accent); }
.cal-day.today .cal-day-num { color: var(–accent); }
.cal-day.selected { background: var(–accent); color: #000; font-weight: 700; }
.cal-day.selected .cal-day-pl { color: rgba(0,0,0,0.7) !important; }
.cal-day.other-month { color: var(–text-dim); opacity: 0.4; }

/* Recent entries */
.recent-title {
font-size: 11px;
color: var(–text-dim);
letter-spacing: 1px;
text-transform: uppercase;
font-family: ‘Share Tech Mono’, monospace;
}

.recent-list {
display: flex;
flex-direction: column;
gap: 6px;
}

.recent-item {
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 6px;
padding: 8px 10px;
cursor: pointer;
transition: all 0.15s;
}

.recent-item:hover { border-color: var(–accent); }

.recent-item-date {
font-family: ‘Share Tech Mono’, monospace;
font-size: 10px;
color: var(–text-dim);
}

.recent-item-preview {
font-size: 12px;
color: var(–text);
margin-top: 2px;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

/* Journal Panel */
.journal-panel {
display: flex;
flex-direction: column;
overflow: hidden;
}

.journal-header {
background: var(–surface);
border-bottom: 1px solid var(–border);
padding: 16px 24px;
display: flex;
align-items: center;
gap: 12px;
}

.journal-date-label {
font-family: ‘Share Tech Mono’, monospace;
font-size: 18px;
color: var(–text-bright);
flex: 1;
}

.mood-select {
display: flex;
gap: 6px;
}

.mood-btn {
width: 32px;
height: 32px;
border-radius: 6px;
border: 1px solid var(–border);
background: none;
font-size: 16px;
cursor: pointer;
transition: all 0.15s;
display: flex;
align-items: center;
justify-content: center;
}

.mood-btn:hover, .mood-btn.active { background: var(–surface2); border-color: var(–accent); }

.save-btn {
background: var(–accent);
color: #000;
border: none;
padding: 8px 20px;
border-radius: 6px;
font-size: 13px;
font-weight: 700;
cursor: pointer;
font-family: ‘Noto Sans JP’, sans-serif;
transition: all 0.15s;
letter-spacing: 0.5px;
}

.save-btn:hover { background: #00ffcc; }

.delete-btn {
background: none;
border: 1px solid var(–bear);
color: var(–bear);
padding: 8px 16px;
border-radius: 6px;
font-size: 12px;
cursor: pointer;
transition: all 0.15s;
}

.delete-btn:hover { background: var(–bear); color: #fff; }

.journal-body {
flex: 1;
overflow-y: auto;
padding: 24px;
display: flex;
flex-direction: column;
gap: 20px;
}

/* Fields */
.field-group {
display: flex;
flex-direction: column;
gap: 6px;
}

.field-label {
font-size: 11px;
color: var(–text-dim);
letter-spacing: 1px;
text-transform: uppercase;
font-family: ‘Share Tech Mono’, monospace;
}

textarea, input[type=text], select {
background: var(–surface);
border: 1px solid var(–border);
color: var(–text-bright);
border-radius: 8px;
padding: 10px 14px;
font-family: ‘Noto Sans JP’, sans-serif;
font-size: 14px;
width: 100%;
transition: border-color 0.2s;
resize: none;
}

textarea:focus, input[type=text]:focus, select:focus {
outline: none;
border-color: var(–accent);
}

textarea { line-height: 1.7; }

.notes-ta { min-height: 180px; }
.chart-ta { min-height: 80px; }

/* Trade result row */
.trade-row {
display: grid;
grid-template-columns: 1fr 1fr 1fr 1fr;
gap: 12px;
}

.result-pill {
display: flex;
gap: 6px;
}

.result-opt {
flex: 1;
padding: 8px;
border-radius: 6px;
border: 1px solid var(–border);
background: none;
color: var(–text-dim);
cursor: pointer;
font-size: 13px;
font-family: ‘Noto Sans JP’, sans-serif;
text-align: center;
transition: all 0.15s;
}

.result-opt:hover { border-color: var(–accent); color: var(–text); }
.result-opt.win.active { background: rgba(0,212,170,0.2); border-color: var(–bull); color: var(–bull); }
.result-opt.loss.active { background: rgba(255,77,109,0.2); border-color: var(–bear); color: var(–bear); }
.result-opt.even.active { background: rgba(255,209,102,0.2); border-color: var(–gold); color: var(–gold); }

/* Image upload */
.image-section {
display: flex;
flex-direction: column;
gap: 10px;
}

.img-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
gap: 10px;
}

.img-card {
aspect-ratio: 16/10;
border-radius: 8px;
overflow: hidden;
position: relative;
border: 1px solid var(–border);
background: var(–surface2);
cursor: pointer;
}

.img-card img {
width: 100%;
height: 100%;
object-fit: cover;
}

.img-card .img-caption {
position: absolute;
bottom: 0;
left: 0;
right: 0;
background: rgba(0,0,0,0.7);
color: #fff;
font-size: 10px;
padding: 3px 6px;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.img-card .img-del {
position: absolute;
top: 4px;
right: 4px;
background: rgba(255,77,109,0.9);
color: #fff;
border: none;
border-radius: 50%;
width: 20px;
height: 20px;
font-size: 12px;
cursor: pointer;
display: none;
align-items: center;
justify-content: center;
line-height: 1;
}

.img-card:hover .img-del { display: flex; }

.upload-zone {
border: 2px dashed var(–border);
border-radius: 8px;
padding: 24px;
text-align: center;
cursor: pointer;
transition: all 0.2s;
color: var(–text-dim);
font-size: 13px;
}

.upload-zone:hover { border-color: var(–accent); color: var(–accent); background: rgba(0,212,170,0.05); }
.upload-zone.drag-over { border-color: var(–accent); background: rgba(0,212,170,0.1); }

.upload-icon { font-size: 28px; margin-bottom: 8px; }

/* Tags */
.tags-container {
display: flex;
flex-wrap: wrap;
gap: 6px;
align-items: center;
}

.tag {
background: var(–surface2);
border: 1px solid var(–border);
color: var(–text);
padding: 3px 10px;
border-radius: 20px;
font-size: 12px;
cursor: pointer;
transition: all 0.15s;
}

.tag.active { background: rgba(0,212,170,0.15); border-color: var(–accent); color: var(–accent); }
.tag:hover { border-color: var(–text-dim); }

.tag-input {
background: none;
border: none;
border-bottom: 1px solid var(–border);
border-radius: 0;
width: 80px;
padding: 3px 4px;
font-size: 12px;
color: var(–text);
}

.tag-input:focus { outline: none; border-color: var(–accent); }

/* Saved toast */
.toast {
position: fixed;
bottom: 24px;
right: 24px;
background: var(–accent);
color: #000;
padding: 12px 20px;
border-radius: 8px;
font-weight: 700;
font-size: 14px;
transform: translateY(80px);
opacity: 0;
transition: all 0.3s;
z-index: 999;
}

.toast.show { transform: translateY(0); opacity: 1; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(–border); border-radius: 4px; }

/* Lightbox */
.lightbox {
display: none;
position: fixed;
inset: 0;
background: rgba(0,0,0,0.9);
z-index: 200;
align-items: center;
justify-content: center;
}

.lightbox.open { display: flex; }

.lightbox img {
max-width: 90vw;
max-height: 90vh;
border-radius: 8px;
object-fit: contain;
}

.lightbox-close {
position: absolute;
top: 16px;
right: 20px;
color: #fff;
font-size: 28px;
cursor: pointer;
background: none;
border: none;
line-height: 1;
}

@media (max-width: 768px) {
.main { grid-template-columns: 1fr; }
.calendar-panel { height: auto; }
.trade-row { grid-template-columns: 1fr 1fr; }
}
</style>

</head>

<script>
// State
let currentDate = new Date();
let selectedDate = null;
let currentEntry = null;
let selectedMood = '';
let selectedResult = '';
let selectedTags = new Set();
let entries = {};

// Load from localStorage
function loadEntries() {
  try {
    const d = localStorage.getItem('fx_entries');
    if (d) entries = JSON.parse(d);
  } catch(e) {}
}

function saveEntries() {
  try {
    localStorage.setItem('fx_entries', JSON.stringify(entries));
  } catch(e) {}
}

loadEntries();

// Calendar
const calGrid = document.getElementById('calGrid');
const calMonthLabel = document.getElementById('calMonthLabel');
const prevMonth = document.getElementById('prevMonth');
const nextMonth = document.getElementById('nextMonth');

const DOW = ['日','月','火','水','木','金','土'];
const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function renderCalendar() {
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  calMonthLabel.textContent = `${year}年 ${MONTHS[month]}`;

  calGrid.innerHTML = '';
  DOW.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    calGrid.appendChild(el);
  });

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date();
  const prevDays = new Date(year, month, 0).getDate();

  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.textContent = prevDays - firstDay + i + 1;
    calGrid.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div');
    el.className = 'cal-day';

    const dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const entry = entries[dateKey];

    const numEl = document.createElement('div');
    numEl.className = 'cal-day-num';
    numEl.textContent = d;
    el.appendChild(numEl);

    if (entry && entry.pl && entry.pl.toString().trim()) {
      const plEl = document.createElement('div');
      const raw = entry.pl.toString().trim();
      // Detect sign for color
      const isNeg = raw.startsWith('-');
      const isPos = raw.startsWith('+') || (!isNeg && raw !== '0' && raw !== '');
      plEl.className = 'cal-day-pl ' + (isNeg ? 'minus' : isPos ? 'plus' : '');
      // Shorten if long
      plEl.textContent = raw.length > 7 ? raw.slice(0, 7) : raw;
      el.appendChild(plEl);
    }

    if (today.getFullYear() === year && today.getMonth() === month && today.getDate() === d)
      el.classList.add('today');

    if (selectedDate === dateKey) el.classList.add('selected');

    el.addEventListener('click', () => selectDate(dateKey));
    calGrid.appendChild(el);
  }

  renderRecentList();
}

prevMonth.addEventListener('click', () => {
  currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1);
  renderCalendar();
});

nextMonth.addEventListener('click', () => {
  currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1);
  renderCalendar();
});

function renderRecentList() {
  const recent = document.getElementById('recentList');
  const keys = Object.keys(entries).sort().reverse().slice(0, 8);
  recent.innerHTML = '';
  keys.forEach(k => {
    const e = entries[k];
    const div = document.createElement('div');
    div.className = 'recent-item';
    div.innerHTML = `<div class="recent-item-date">${k} ${e.mood || ''} ${e.result === 'win' ? '✅' : e.result === 'loss' ? '❌' : ''}</div>
      <div class="recent-item-preview">${e.notes || '(メモなし)'}</div>`;
    div.addEventListener('click', () => selectDate(k));
    recent.appendChild(div);
  });
}

// Journal
function selectDate(dateKey) {
  selectedDate = dateKey;
  renderCalendar();
  loadEntry(dateKey);

  const parts = dateKey.split('-');
  document.getElementById('journalDateLabel').textContent =
    `${parts[0]}年${parseInt(parts[1])}月${parseInt(parts[2])}日`;
  document.getElementById('deleteBtn').style.display = entries[dateKey] ? '' : 'none';
}

function loadEntry(dateKey) {
  const e = entries[dateKey] || {};
  currentEntry = e;

  document.getElementById('pairInput').value = e.pair || '';
  document.getElementById('dirSelect').value = e.dir || '';
  document.getElementById('plInput').value = e.pl || '';
  document.getElementById('lotInput').value = e.lot || '';
  document.getElementById('notesInput').value = e.notes || '';
  document.getElementById('reflectionInput').value = e.reflection || '';

  // mood
  selectedMood = e.mood || '';
  document.querySelectorAll('.mood-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mood === selectedMood);
  });

  // result
  selectedResult = e.result || '';
  document.querySelectorAll('.result-opt').forEach(b => {
    b.classList.toggle('active', b.dataset.result === selectedResult);
  });

  // tags
  selectedTags = new Set(e.tags || []);
  document.querySelectorAll('.tag').forEach(t => {
    t.classList.toggle('active', selectedTags.has(t.dataset.tag));
  });

  // images
  renderImages(e.images || []);
}

// Mood
document.querySelectorAll('.mood-btn').forEach(b => {
  b.addEventListener('click', () => {
    selectedMood = selectedMood === b.dataset.mood ? '' : b.dataset.mood;
    document.querySelectorAll('.mood-btn').forEach(x => x.classList.remove('active'));
    if (selectedMood) b.classList.add('active');
  });
});

// Result
document.querySelectorAll('.result-opt').forEach(b => {
  b.addEventListener('click', () => {
    selectedResult = selectedResult === b.dataset.result ? '' : b.dataset.result;
    document.querySelectorAll('.result-opt').forEach(x => x.classList.remove('active'));
    if (selectedResult) b.classList.add('active');
  });
});

// Tags
document.querySelectorAll('.tag').forEach(t => {
  t.addEventListener('click', () => {
    const tag = t.dataset.tag;
    if (selectedTags.has(tag)) { selectedTags.delete(tag); t.classList.remove('active'); }
    else { selectedTags.add(tag); t.classList.add('active'); }
  });
});

const tagInput = document.getElementById('tagCustomInput');
tagInput.addEventListener('keydown', (e) => {
  if ((e.key === 'Enter' || e.key === ',') && tagInput.value.trim()) {
    e.preventDefault();
    const tag = tagInput.value.trim();
    selectedTags.add(tag);
    const span = document.createElement('span');
    span.className = 'tag active';
    span.dataset.tag = tag;
    span.textContent = tag;
    span.addEventListener('click', () => {
      selectedTags.delete(tag);
      span.remove();
    });
    tagInput.parentNode.insertBefore(span, tagInput);
    tagInput.value = '';
  }
});

// Save
document.getElementById('saveBtn').addEventListener('click', () => {
  if (!selectedDate) { alert('日付を選択してください'); return; }
  const e = entries[selectedDate] || {};
  e.pair = document.getElementById('pairInput').value;
  e.dir = document.getElementById('dirSelect').value;
  e.pl = document.getElementById('plInput').value;
  e.lot = document.getElementById('lotInput').value;
  e.notes = document.getElementById('notesInput').value;
  e.reflection = document.getElementById('reflectionInput').value;
  e.mood = selectedMood;
  e.result = selectedResult;
  e.tags = [...selectedTags];
  if (!e.images) e.images = [];
  entries[selectedDate] = e;
  saveEntries();
  renderCalendar();
  document.getElementById('deleteBtn').style.display = '';
  showToast();
});

document.getElementById('deleteBtn').addEventListener('click', () => {
  if (!selectedDate || !confirm('この記録を削除しますか?')) return;
  delete entries[selectedDate];
  saveEntries();
  loadEntry(selectedDate);
  document.getElementById('deleteBtn').style.display = 'none';
  renderCalendar();
});

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Images
const fileInput = document.getElementById('fileInput');
const uploadZone = document.getElementById('uploadZone');

uploadZone.addEventListener('click', () => fileInput.click());

uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
});

fileInput.addEventListener('change', () => handleFiles(fileInput.files));

function handleFiles(files) {
  if (!selectedDate) { alert('先に日付を選択してください'); return; }
  Array.from(files).forEach(file => {
    if (!file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      const entry = entries[selectedDate] || {};
      if (!entry.images) entry.images = [];
      entry.images.push({ src: e.target.result, name: file.name });
      entries[selectedDate] = entry;
      saveEntries();
      renderImages(entry.images);
    };
    reader.readAsDataURL(file);
  });
}

function renderImages(images) {
  const grid = document.getElementById('imgGrid');
  grid.innerHTML = '';
  (images || []).forEach((img, i) => {
    const card = document.createElement('div');
    card.className = 'img-card';
    card.innerHTML = `<img src="${img.src}" alt="${img.name}">
      <div class="img-caption">${img.name}</div>
      <button class="img-del" data-i="${i}">✕</button>`;
    card.querySelector('img').addEventListener('click', () => openLightbox(img.src));
    card.querySelector('.img-del').addEventListener('click', (e) => {
      e.stopPropagation();
      const entry = entries[selectedDate];
      entry.images.splice(i, 1);
      saveEntries();
      renderImages(entry.images);
    });
    grid.appendChild(card);
  });
}

// Lightbox
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}
document.getElementById('lightboxClose').addEventListener('click', () => {
  document.getElementById('lightbox').classList.remove('open');
});
document.getElementById('lightbox').addEventListener('click', (e) => {
  if (e.target === document.getElementById('lightbox'))
    document.getElementById('lightbox').classList.remove('open');
});

// Tab switching
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const target = tab.dataset.tab;
    document.getElementById('journalView').style.display = target === 'journal' ? '' : 'none';
    document.getElementById('libraryPanel').classList.toggle('visible', target === 'library');
    if (target === 'library') renderLibrary();
  });
});

// Library data
let library = {};

function loadLibrary() {
  try {
    const d = localStorage.getItem('fx_library');
    if (d) library = JSON.parse(d);
    // Default categories on first load
    if (!library.categories) {
      library.categories = [
        { id: 'patterns', icon: '📊', name: 'チャートパターン', notes: '', images: [] },
        { id: 'tips',     icon: '💡', name: 'エントリー裏技',   notes: '', images: [] },
        { id: 'rules',    icon: '🛡️', name: 'マイルール',        notes: '', images: [] },
      ];
    }
  } catch(e) { library = { categories: [] }; }
}

function saveLibrary() {
  try {
    localStorage.setItem('fx_library', JSON.stringify(library));
    const ind = document.getElementById('libSaveIndicator');
    ind.classList.add('show');
    setTimeout(() => ind.classList.remove('show'), 1500);
  } catch(e) {}
}

loadLibrary();

});

body.appendChild(form);
}

function renderLibImages(catId) {

const grid = document.getElementById(`libGrid-${catId}`);

grid.innerHTML = ‘’;
(cat.images || []).forEach((img, i) => {
const card = document.createElement(‘div’);
card.className = ‘img-card’;
card.innerHTML = `<img src="${img.src}" alt="${img.name}"> <div class="img-caption">${img.name}</div> <button class="img-del">✕</button>`;
card.querySelector(‘img’).addEventListener(‘click’, () => openLightbox(img.src));

cat.images.splice(i, 1);
saveLibrary();
renderLibImages(catId);

saveLibrary();

const countEl = document.querySelector(`.lib-category[data-id="${cat.id}"] .lib-cat-count`);
if (countEl) countEl.textContent = cat.images.length + ‘枚’;
};
reader.readAsDataURL(file);
});
e.target.value = ‘’;
});
